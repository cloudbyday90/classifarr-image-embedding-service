name: Trivy Security Scan

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

on:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  schedule:
    # Weekly scan on Tuesday at 02:00 UTC (staggered from CodeQL on Monday)
    - cron: '0 2 * * 2'

jobs:
  trivy-fs:
    name: Filesystem Vulnerability & Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF to GitHub Security tab
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # SARIF pass: upload all HIGH/CRITICAL findings to the Security tab
      - name: Run Trivy (SARIF upload)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results.sarif
          limit-severities-for-sarif: true
          skip-dirs: .git,__pycache__,.venv,venv,.pytest_cache

      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      # Table pass: gate the PR/push on exit code (fail on HIGH/CRITICAL)
      - name: Run Trivy (PR gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          skip-dirs: .git,__pycache__,.venv,venv,.pytest_cache
          skip-setup-trivy: true  # Trivy already installed by the previous step

  trivy-config:
    name: Dockerfile & Docker Compose Misconfig Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Scans Dockerfile and docker-compose*.yml against CIS Docker Benchmark
      - name: Run Trivy (IaC misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-config-results.sarif

      - name: Upload Trivy config results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config
