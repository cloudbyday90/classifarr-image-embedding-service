name: CodeQL Analysis

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

on:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
  push:
    branches: [ main, master ]
  schedule:
    # Weekly scan on Monday at 02:00 UTC (low-traffic window)
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'actions' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended covers OWASP Top 10 and additional CWEs beyond the default suite
          queries: security-extended
          config: |
            paths-ignore:
              - '**/__pycache__/**'
              - '**/*.pyc'
              - 'tests/**'
              - '.venv/**'
              - 'venv/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
