services:
  image-embedder:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      # Secrets only — all other settings live in config.toml (mounted below).
      # Set SERVICE_API_KEY via .env (run: python scripts/generate_env.py)
      SERVICE_API_KEY: ${SERVICE_API_KEY:-}
    configs:
      - source: app_config
        target: /app/config.toml
        mode: 0444
    volumes:
      # Persist downloaded HuggingFace models across container restarts.
      - model-cache:/app/.cache

configs:
  app_config:
    file: ./config.toml

volumes:
  model-cache:
