# Classifarr Image Embedding Service — application configuration
# This file is mounted read-only into the container (mode 0444 via Docker configs).
# Environment variables always override values defined here — useful for CI overrides.
# Secrets (SERVICE_API_KEY) must never appear in this file — use .env instead.

[server]
host = "0.0.0.0"
port = 8000
shutdown_timeout_seconds = 30

[model]
default_model = "ViT-L-14"
device = "auto"             # "auto"            — selects cuda if available, else cpu
                            # "cpu"             — force CPU (torch)
                            # "cuda"            — force NVIDIA GPU (torch + CUDA)
                            # "rocm"            — AMD GPU (ROCm/HIP); Linux only — raises an
                            #                     error on Windows (Windows ROCm is unsupported)
                            # "openvino"        — Intel AUTO (OpenVINO picks best: GPU > CPU)
                            # "openvino:AUTO"   — same as above, explicit
                            # "openvino:CPU"    — Intel CPU via OpenVINO (AVX-512/VNNI)
                            # "openvino:GPU"    — Intel iGPU (12th-gen+) or Arc GPU
                            # "openvino:GPU.0"  — first discrete Arc GPU only
warmup_on_startup = true
embed_cache_size = 1000     # max number of (image, model, size, normalize) tuples to cache in memory; 0 = disabled

[image]
allow_remote_urls = false
allowed_remote_hosts = []   # when allow_remote_urls = true, restrict to these hosts
max_image_bytes = 10485760  # 10 MiB
request_timeout_seconds = 15

[queue]
concurrency = 1
max_queue = 100
max_wait_seconds = 60
batch_window_ms = 0   # ms to wait for more requests before flushing a batch; 0 = disabled
batch_max_size = 8    # maximum images per internal batch flush
batch_api_max_items = 32  # maximum items per POST /embed-batch request (hard limit; 413 if exceeded)

[logging]
level = "INFO"              # DEBUG, INFO, WARNING, ERROR
json_format = false
max_bytes = 10485760        # 10 MiB per log file before rotation
backup_count = 5

[memory]
cleanup_interval_seconds = 300
max_process_memory_mb = 0   # 0 = no limit
max_gpu_memory_mb = 0       # 0 = no limit
cleanup_on_shutdown = true
embed_cleanup_every_n = 0   # call cleanup_gpu_memory() every N embeds; 0 = disabled (recommended for CPU)

[auth]
require_api_key = true
rate_limit_embed = "30/minute"   # format: "<count>/<period>" e.g. "10/minute", "2/second"
rate_limit_health = "120/minute" # unauthenticated endpoints — higher limit, still bounded
# SERVICE_API_KEY is intentionally absent — set it via the .env file (see scripts/generate_env.py)
