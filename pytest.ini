[pytest]
pythonpath = src tests
testpaths = tests
addopts = --cov=image_embedder --cov-report=term-missing --cov-report=xml --cov-branch
filterwarnings =
    # slowapi uses asyncio.iscoroutinefunction() which is deprecated in 3.12+ (removed in 3.16).
    # This is an upstream bug in slowapi; suppress until they release a fix.
    ignore::DeprecationWarning:slowapi.*
